name: DCO Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO Sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          failed=0
          while IFS= read -r sha; do
            if ! git log -1 --format='%B' "$sha" | grep -qi '^Signed-off-by:'; then
              echo "::error::Commit $sha is missing a DCO Signed-off-by line"
              failed=1
            fi
          done < <(git rev-list "$base".."$head")
          if [ "$failed" -eq 1 ]; then
            echo "One or more commits are missing a Signed-off-by line."
            echo "Please amend with: git commit --amend -s"
            exit 1
          fi
          echo "All commits have DCO sign-off."
