name: Desktop Build

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/client/**"
      - "packages/shared/**"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/client/**"
      - "packages/shared/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: echo "version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    permissions:
      contents: write   # tauri-action publishes release assets
      id-token: write   # azure/login OIDC (only consumed on the Windows leg)
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: appimage-deb
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: msi

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})
    env:
      # Unified predicate for Windows code-signing. Signing is active only when
      # ALL of the following hold:
      #   - this is the Windows leg of the matrix
      #   - the WINDOWS_SIGNING_ENABLED repo variable is flipped on
      #   - the event is trusted (not a fork PR — GitHub does not issue OIDC
      #     ID tokens to fork PRs, and we don't want to spend signing credits
      #     on every internal PR push either).
      # When the predicate is empty, the strip step removes signCommand from
      # tauri.conf.json so the Tauri build still produces an unsigned MSI.
      WINDOWS_SIGNING_ACTIVE: >-
        ${{ matrix.platform == 'windows-latest'
            && vars.WINDOWS_SIGNING_ENABLED == 'true'
            && github.event_name != 'pull_request'
            && '1' || '' }}
      # macOS code-signing is active only when an Apple Developer ID
      # certificate has been provisioned in repo secrets. Until then
      # the strip step removes the hardened-runtime entitlements field
      # so the Tauri bundler doesn't attempt to codesign with a missing
      # cert (which fails with `security import` errors).
      # On fork PRs, GitHub masks secrets (resolves to ''), so the strip
      # step always runs there — producing unsigned artifacts, which is correct.
      # macOS code-signing is active only when *all* required Apple
      # secrets are populated. Checking only APPLE_CERTIFICATE would let
      # the import step run with a missing password (→ "MAC verification
      # failed") or let the build proceed without a signing identity
      # / notarization creds (→ confusing late failure). On fork PRs
      # GitHub masks secrets (resolves to ''), so the strip step always
      # runs there — producing unsigned artifacts, which is correct.
      MACOS_SIGNING_ACTIVE: >-
        ${{ startsWith(matrix.platform, 'macos')
            && secrets.APPLE_CERTIFICATE != ''
            && secrets.APPLE_CERTIFICATE_PASSWORD != ''
            && secrets.APPLE_SIGNING_IDENTITY != ''
            && secrets.APPLE_ID != ''
            && secrets.APPLE_PASSWORD != ''
            && secrets.APPLE_TEAM_ID != ''
            && '1' || '' }}
      # Tauri updater signing is active only when the Ed25519 private key
      # is provisioned. Same Ok("") pitfall as APPLE_*: forwarding an empty
      # string would make tauri-bundler attempt to sign updater artifacts
      # with an empty key. We export TAURI_SIGNING_* via GITHUB_ENV in a
      # gated step so the vars are absent (not empty) when inactive, and
      # the bundler skips updater signing instead of failing.
      TAURI_SIGNING_ACTIVE: >-
        ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && '1' || '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Build workspace deps
        run: npx turbo run build --filter=@muddown/client... --filter=@muddown/shared...

      # ---- Windows Authenticode signing (Microsoft Artifact Signing) ----
      # Steps below are gated on env.WINDOWS_SIGNING_ACTIVE (defined at the
      # job level above). When inactive, the strip step removes signCommand
      # from tauri.conf.json so the Windows leg still produces an unsigned MSI.
      - name: Strip signCommand when signing inactive
        if: matrix.platform == 'windows-latest' && env.WINDOWS_SIGNING_ACTIVE != '1'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cfg = "apps/desktop/src-tauri/tauri.conf.json"
          $json = Get-Content $cfg -Raw | ConvertFrom-Json
          if ($json.bundle.windows.PSObject.Properties.Name -contains 'signCommand') {
            $json.bundle.windows.PSObject.Properties.Remove('signCommand')
            $json | ConvertTo-Json -Depth 32 | Set-Content $cfg -Encoding utf8
            Write-Host "signCommand stripped (WINDOWS_SIGNING_ACTIVE != '1')"
          }

      - name: Strip macOS entitlements when signing inactive
        if: startsWith(matrix.platform, 'macos') && env.MACOS_SIGNING_ACTIVE != '1'
        run: |
          set -euo pipefail
          cfg="apps/desktop/src-tauri/tauri.conf.json"
          # The hardened-runtime entitlements field forces tauri-bundler
          # to invoke `security import` + codesign. Strip it (and any
          # signingIdentity) when no Apple Developer ID cert is
          # provisioned so the build still produces an unsigned .app/.dmg.
          if ! jq -e 'type == "object"' "$cfg" > /dev/null 2>&1; then
            echo "::error::$cfg is missing, empty, or not a JSON object — refusing to strip" >&2
            exit 1
          fi
          tmp=$(mktemp) || { echo "::error::mktemp failed — /tmp may be full or unwritable" >&2; exit 1; }
          jq 'del(.bundle.macOS.entitlements) | del(.bundle.macOS.signingIdentity) | del(.bundle.macOS.providerShortName)' "$cfg" > "$tmp"
          # Use cat to overwrite in place so the destination's mode/owner are preserved
          # (avoids portability issues with `stat -f` format strings between BSD and GNU).
          cat "$tmp" > "$cfg"
          rm -f "$tmp"
          if jq -e '.bundle.macOS.entitlements // empty' "$cfg" > /dev/null 2>&1; then
            echo "::error::bundle.macOS.entitlements still present after strip — check key path in jq filter" >&2
            exit 1
          fi
          echo "macOS signing config stripped (MACOS_SIGNING_ACTIVE != '1')"

      - name: Azure login (OIDC)
        if: env.WINDOWS_SIGNING_ACTIVE == '1'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Artifact Signing Client Tools + write signtool metadata
        if: env.WINDOWS_SIGNING_ACTIVE == '1'
        shell: pwsh
        env:
          AZURE_CODE_SIGNING_ENDPOINT: ${{ vars.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ vars.AZURE_CERT_PROFILE_NAME }}
        run: |
          $ErrorActionPreference = 'Stop'

          # Validate required GitHub Actions variables are set (unset vars
          # expand to empty strings, which would yield syntactically valid
          # JSON that the signing client rejects with an opaque error).
          foreach ($name in 'AZURE_CODE_SIGNING_ENDPOINT','AZURE_CODE_SIGNING_ACCOUNT_NAME','AZURE_CERT_PROFILE_NAME') {
            if (-not (Get-Item "env:$name" -ErrorAction SilentlyContinue).Value) {
              throw "Required GitHub Actions variable $name is not set"
            }
          }
          if (-not $env:RUNNER_TEMP) { throw "RUNNER_TEMP is not set" }

          # Install only the Artifact Signing dlib via NuGet — SignTool and
          # the .NET 8 Runtime are already present on the windows-latest
          # runner image, so we don't need the full MSI installer (which
          # bundles chained .NET 8 / VC++ Redist installers and has been
          # observed to take 25+ minutes to complete on hosted runners,
          # even with /quiet /norestart).
          #
          # Microsoft documents this as an explicit alternative; see the
          # "Download and install the Artifact Signing dlib package" section
          # of https://learn.microsoft.com/en-us/azure/artifact-signing/how-to-signing-integrations
          # and the package page at https://www.nuget.org/packages/Microsoft.ArtifactSigning.Client.
          #
          # The .nupkg is pinned by SHA-256 so a swapped payload from
          # nuget.org would fail closed before being used to produce
          # trusted signatures. Regenerate the hash when bumping the
          # version constant below.
          $asClientVersion = "1.0.128"
          $expectedHash    = "74BD7D27E6CE1051409C38D9B46BC8DF0400ECD643D51FFBF2AC00869061E40B"
          $nupkg           = Join-Path $env:RUNNER_TEMP "Microsoft.ArtifactSigning.Client.nupkg"
          $extractRoot     = Join-Path $env:RUNNER_TEMP "artifact-signing-client"

          $ProgressPreference = 'SilentlyContinue'
          # Use the NuGet v3 flat-container URL: direct download, no
          # redirect chain, and the canonical stable address for a
          # specific package version (the v2 OData API is on a
          # long-term deprecation path).
          Invoke-WebRequest `
            -Uri "https://api.nuget.org/v3-flatcontainer/microsoft.artifactsigning.client/$asClientVersion/microsoft.artifactsigning.client.$asClientVersion.nupkg" `
            -OutFile $nupkg `
            -TimeoutSec 300
          $actualHash = (Get-FileHash $nupkg -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            throw "Microsoft.ArtifactSigning.Client.$asClientVersion.nupkg checksum mismatch: expected $expectedHash, got $actualHash. If the pinned version was bumped, regenerate the hash."
          }
          Expand-Archive -Path $nupkg -DestinationPath $extractRoot -Force
          Remove-Item $nupkg -Force

          $dlib = Join-Path $extractRoot "bin\x64\Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path $dlib)) { throw "dlib not found at $dlib" }

          # SignTool from the Windows SDK on windows-latest. The 20348 SDK
          # is documented as incompatible with the dlib; pick 22621 or
          # newer. Glob the bin folder so the workflow keeps working as
          # the runner image upgrades the SDK.
          $sdkBin = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $sdkBin -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\10\.0\.(\d+)\.\d+\\x64\\signtool\.exe$' -and [int]$Matches[1] -ge 22621 } |
            Sort-Object { [int]([regex]::Match($_.FullName, '\\10\.0\.(\d+)\.').Groups[1].Value) } -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "No compatible signtool.exe (Windows SDK 22621+) found under $sdkBin" }
          Write-Host "Using signtool: $signtool"

          # .NET 8 Runtime is preinstalled on windows-latest images; verify
          # so we fail loudly if a future image change drops it.
          $hasNet8 = (& dotnet --list-runtimes 2>$null) -match 'Microsoft\.NETCore\.App 8\.'
          if (-not $hasNet8) { throw ".NET 8 Runtime not found on runner; signing dlib requires it" }

          $metadata = Join-Path $env:RUNNER_TEMP "artifact-signing-metadata.json"
          @{
            Endpoint               = $env:AZURE_CODE_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_CODE_SIGNING_ACCOUNT_NAME
            CertificateProfileName = $env:AZURE_CERT_PROFILE_NAME
          } | ConvertTo-Json | Set-Content -Path $metadata -Encoding ascii

          "CODE_SIGNING_DLIB=$dlib"         | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "CODE_SIGNING_METADATA=$metadata" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "SIGNTOOL_PATH=$signtool"         | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

          # tauri-bundler spawns signCommand directly via CreateProcess (no
          # cmd.exe shell), so %VAR% placeholders in tauri.conf.json are
          # taken as a literal program name and fail with "program not
          # found". Worse, when signCommand is a string tauri-bundler
          # shell-word-splits it (treating backslash as an escape char),
          # which mangles Windows paths and produces ERROR_INVALID_NAME
          # (os error 123) at sign time.
          #
          # Tauri v2 accepts signCommand as either a string or an object
          # { cmd, args }. The object form is passed straight to
          # std::process::Command without any parsing, so it preserves
          # backslashes and embedded spaces correctly. Use it.
          $cfg  = "apps/desktop/src-tauri/tauri.conf.json"
          $json = Get-Content $cfg -Raw | ConvertFrom-Json
          $signCommand = [PSCustomObject]@{
            cmd  = $signtool
            args = @(
              "sign",
              "/v",
              "/fd", "SHA256",
              "/tr", "http://timestamp.acs.microsoft.com",
              "/td", "SHA256",
              "/dlib", $dlib,
              "/dmdf", $metadata,
              "%1"
            )
          }
          $json.bundle.windows.signCommand = $signCommand
          $json | ConvertTo-Json -Depth 32 | Set-Content $cfg -Encoding utf8
          Write-Host "signCommand.cmd  = $($signCommand.cmd)"
          Write-Host "signCommand.args = $($signCommand.args -join ' ')"

      # Apple notarization env vars are only exported when MACOS_SIGNING_ACTIVE == '1'.
      #
      # We deliberately do NOT pass APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD
      # to tauri-action. tauri-bundler's env-driven `security import` codepath
      # is unreliable on macOS 15 runners — both the OpenSSL `-legacy` (RC2-40)
      # and OpenSSL 3 default (PBES2/AES) PKCS12 formats are rejected by
      # `security import` against the runner's default keychain, with errors
      # like "One or more parameters passed to a function were not valid" or
      # "MAC verification failed during PKCS12 import (wrong password?)".
      #
      # Instead, the "Import Apple cert into build keychain" step below creates
      # a temporary keychain, imports the .p12 there, and adds it to the
      # search list. tauri-bundler then locates the identity via
      # APPLE_SIGNING_IDENTITY and skips the `security import` step entirely.
      #
      # Forwarding empty strings to APPLE_SIGNING_IDENTITY etc. would still be
      # bad (env::var returns Ok("") for empty vars, which the bundler doesn't
      # treat as "unset"). We export to GITHUB_ENV so vars are simply absent
      # when inactive, and the bundler falls through to ad-hoc codesign.
      - name: Import Apple cert into build keychain (signing active)
        if: startsWith(matrix.platform, 'macos') && env.MACOS_SIGNING_ACTIVE == '1'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          CERT_PATH="$RUNNER_TEMP/apple-cert.p12"

          # Defence-in-depth: scrub the decoded .p12 even if a later
          # command aborts under `set -e`. Runners are ephemeral, but
          # the file contains the unencrypted-once-imported key so
          # there's no reason to leave it on disk a moment longer than
          # necessary.
          #
          # Note: do *not* delete the keychain here — this trap fires when
          # the import step's shell exits, but the keychain must persist
          # into the later "Build Tauri app" step (a separate shell
          # invocation) for codesign to find the signing identity. Keychain
          # teardown happens in a dedicated `if: always()` cleanup step at
          # the end of the job.
          trap 'rm -f "$CERT_PATH"' EXIT

          # Strip stray CR/LF from the secrets. GitHub secret expansion
          # via `env:` can introduce a trailing newline; passing that to
          # `security import -P` produces a 33-byte password and fails
          # with "MAC verification failed during PKCS12 import (wrong
          # password?)" even when the password and .p12 are correct.
          APPLE_CERTIFICATE="$(printf '%s' "$APPLE_CERTIFICATE" | tr -d '\r\n')"
          APPLE_CERTIFICATE_PASSWORD="$(printf '%s' "$APPLE_CERTIFICATE_PASSWORD" | tr -d '\r\n')"

          # macOS BSD `base64` uses -D, GNU uses -d. `openssl base64 -d -A`
          # is portable and tolerates trailing newlines in the input.
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A > "$CERT_PATH"

          # Diagnostics: confirm the .p12 round-tripped intact and the
          # password is the expected length. Neither value is sensitive
          # (the sha256 of the public-cert-bundled .p12 doesn't reveal
          # the private key, and we print only the byte length of the
          # password, never its content). This isolates "GitHub secret
          # corruption" from "security-import bug".
          echo "p12 size:        $(wc -c < "$CERT_PATH" | tr -d ' ') bytes"
          echo "p12 sha256:      $(shasum -a 256 "$CERT_PATH" | awk '{print $1}')"
          echo "password length: ${#APPLE_CERTIFICATE_PASSWORD} bytes"

          # Cross-check the password against the .p12 with openssl,
          # which uses an independent PKCS12 implementation. If openssl
          # accepts the password but `security import` rejects it,
          # we're hitting a security(1) bug rather than bad inputs.
          if openssl pkcs12 -in "$CERT_PATH" \
              -passin "pass:$APPLE_CERTIFICATE_PASSWORD" \
              -nokeys -noout 2>/dev/null; then
            echo "✓ openssl accepts the .p12 password"
          else
            echo "✗ openssl rejects the .p12 password — secret is corrupted"
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # `-T /usr/bin/codesign` authorises codesign to use the imported
          # private key without an interactive prompt. `-A` would authorise
          # *all* apps and is too broad for CI.
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          # Required on macOS 10.12+ — without this, codesign prompts for the
          # keychain password (which fails non-interactively in CI).
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add the build keychain to the user's search list so codesign
          # can find the identity. Preserve existing entries.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/[\" ]//g')

          # CERT_PATH cleanup is handled by the EXIT trap above.
          echo "✓ Imported Apple identity into $KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Export Apple signing env (signing active)
        if: startsWith(matrix.platform, 'macos') && env.MACOS_SIGNING_ACTIVE == '1'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # Use the heredoc form documented at
          # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
          # so multi-line values survive without splitting.
          write_var() {
            local name="$1"
            local value="$2"
            local delim
            delim="EOF_$(openssl rand -hex 8)"
            {
              echo "${name}<<${delim}"
              printf '%s\n' "$value"
              echo "${delim}"
            } >> "$GITHUB_ENV"
          }
          write_var APPLE_SIGNING_IDENTITY     "$APPLE_SIGNING_IDENTITY"
          write_var APPLE_ID                   "$APPLE_ID"
          write_var APPLE_PASSWORD             "$APPLE_PASSWORD"
          write_var APPLE_TEAM_ID              "$APPLE_TEAM_ID"

      - name: Export Tauri updater signing env (signing active)
        if: env.TAURI_SIGNING_ACTIVE == '1'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          # Multi-line heredoc form so the Ed25519 private key (which contains
          # newlines) survives intact. See:
          # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
          write_var() {
            local name="$1"
            local value="$2"
            local delim
            delim="EOF_$(openssl rand -hex 8)"
            {
              echo "${name}<<${delim}"
              printf '%s\n' "$value"
              echo "${delim}"
            } >> "$GITHUB_ENV"
          }
          write_var TAURI_SIGNING_PRIVATE_KEY          "$TAURI_SIGNING_PRIVATE_KEY"
          write_var TAURI_SIGNING_PRIVATE_KEY_PASSWORD "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          # On push to main, create/update a GitHub Release and upload artifacts + latest.json
          tagName: ${{ github.ref == 'refs/heads/main' && format('desktop-v{0}', needs.get-version.outputs.version) || '' }}
          releaseName: ${{ github.ref == 'refs/heads/main' && format('MUDdown Desktop v{0}', needs.get-version.outputs.version) || '' }}
          releaseBody: ${{ github.ref == 'refs/heads/main' && 'See the assets below to download the desktop app for your platform.' || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Install minisign (signature verification test)
        if: matrix.platform != 'windows-latest'
        run: |
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            curl -sSL -o minisign.tar.gz \
              "https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz"
            echo "9a599b48ba6eb7b1e80f12f36b94ceca7c00b7a5173c95c3efc88d9822957e73  minisign.tar.gz" | sha256sum -c -
            tar xzf minisign.tar.gz
            sudo install -m 755 minisign-linux/x86_64/minisign /usr/local/bin/minisign
          else
            brew install minisign
          fi

      - name: Verify update signatures
        if: matrix.platform != 'windows-latest'
        run: |
          export TAURI_PUBKEY=$(jq -r '.plugins.updater.pubkey' apps/desktop/src-tauri/tauri.conf.json)
          bash apps/desktop/tests/verify-signature.sh ${{ matrix.target }}

      - name: Verify notarization (macOS)
        if: startsWith(matrix.platform, 'macos') && env.MACOS_SIGNING_ACTIVE == '1'
        run: |
          set -euo pipefail
          DMG=$(find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle -name "*.dmg" -print -quit)
          if [ -z "$DMG" ]; then
            echo "::error::Signing was active but no .dmg found — bundle may have failed" >&2
            exit 1
          fi

          # tauri-action submits the .app to Apple's notary service and
          # staples the ticket onto the .app, then re-bundles the signed
          # + stapled .app into a .dmg. The .dmg itself is not submitted,
          # so `stapler staple <dmg>` would fail (exit 65). Validate the
          # .app inside the .dmg instead — that's what Gatekeeper checks
          # when the user double-clicks the app after copying it out of
          # the .dmg.
          MOUNT_POINT="$RUNNER_TEMP/dmg-verify-$$"
          mkdir -p "$MOUNT_POINT"
          # Set the cleanup trap *before* attaching so that an interrupt or
          # signal between attach and the next line cannot leave a mounted
          # volume without a cleanup handler.
          trap 'hdiutil detach "$MOUNT_POINT" -force >/dev/null 2>&1 || true' EXIT
          # `-nobrowse` keeps the volume out of Finder; `-readonly` makes
          # the operation race-free against any concurrent writers.
          # No `-noverify` — we want the CRC check to catch a truncated or
          # corrupted .dmg rather than silently mounting a damaged artifact.
          hdiutil attach "$DMG" -mountpoint "$MOUNT_POINT" -nobrowse -readonly

          APP=$(find "$MOUNT_POINT" -maxdepth 2 -name "*.app" -print -quit)
          if [ -z "$APP" ]; then
            echo "::error::No .app found inside $DMG" >&2
            exit 1
          fi

          echo "Verifying notarization staple on $APP"
          xcrun stapler validate "$APP"

          echo "Verifying Gatekeeper acceptance on $APP"
          spctl --assess --type execute --verbose=2 "$APP"

      - name: Verify Authenticode signature (Windows)
        if: env.WINDOWS_SIGNING_ACTIVE == '1'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = Get-ChildItem -Recurse -Path "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle" -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No .msi found — signing was active but Tauri produced no MSI artifact"
            exit 1
          }
          Write-Host "Verifying $($msi.FullName)"
          & "$env:SIGNTOOL_PATH" verify /pa /v $msi.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "signtool verify failed with exit code $LASTEXITCODE"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: error

      # Tear down the temporary build keychain regardless of whether the
      # build succeeded. Runs unconditionally so a failed build still
      # cleans up the user keychain search list (relevant on self-hosted
      # runners; harmless on GitHub-hosted ephemeral VMs).
      - name: Remove temporary build keychain
        if: always() && startsWith(matrix.platform, 'macos') && env.MACOS_SIGNING_ACTIVE == '1'
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
