name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []
    # Only deploy after CI passes (CI runs in parallel on push to main)
    # The deploy job itself re-runs build to ensure the server artifact is fresh
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H muddown.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        env:
          SSH_USER: deploy
          SSH_HOST: muddown.com
          SSH_KEY: ~/.ssh/deploy_key
          INSTALL_DIR: /opt/muddown
        run: |
          ssh -i "$SSH_KEY" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" bash -s << 'REMOTE_SCRIPT'
            set -euo pipefail

            INSTALL_DIR="/opt/muddown"

            echo "==> Pulling latest changes..."
            cd "$INSTALL_DIR"
            sudo -u muddown git fetch origin main
            sudo -u muddown git reset --hard origin/main

            echo "==> Installing dependencies..."
            sudo -u muddown npm ci --ignore-scripts=false

            echo "==> Building..."
            sudo -u muddown npx turbo run build --force --filter='!@muddown/desktop'

            echo "==> Applying nginx patch helper..."
            # patch-nginx.sh returns:
            #   0 = fully applied
            #   2 = snippets applied, site merge still pending (expected/safe)
            #   other = failure
            set +e
            sudo "$INSTALL_DIR/deploy/patch-nginx.sh"
            NGINX_PATCH_EXIT=$?
            set -e
            if [[ "$NGINX_PATCH_EXIT" -eq 0 ]]; then
              echo "✓ Nginx patch applied"
            elif [[ "$NGINX_PATCH_EXIT" -eq 2 ]]; then
              echo "⚠ Nginx snippets applied; manual site merge pending"
              echo "  Review on server: /etc/nginx/sites-available/muddown.conf.repo-new"
            else
              echo "✗ Nginx patch failed (exit $NGINX_PATCH_EXIT)"
              exit "$NGINX_PATCH_EXIT"
            fi

            echo "==> Restarting game server..."
            sudo systemctl restart muddown-server

            echo "==> Verifying server is running..."
            sleep 2
            if systemctl is-active --quiet muddown-server; then
              echo "✓ muddown-server is running"
            else
              echo "✗ muddown-server failed to start"
              sudo journalctl -u muddown-server -n 20 --no-pager
              exit 1
            fi

            echo "==> Restarting telnet bridge..."
            sudo systemctl restart muddown-bridge

            echo "==> Verifying bridge is running..."
            sleep 2
            if systemctl is-active --quiet muddown-bridge; then
              echo "✓ muddown-bridge is running"
            else
              echo "✗ muddown-bridge failed to start"
              sudo journalctl -u muddown-bridge -n 20 --no-pager
              exit 1
            fi

            echo "==> Restarting Discord bridge..."
            sudo systemctl restart muddown-discord-bridge

            echo "==> Verifying Discord bridge is running..."
            sleep 2
            if systemctl is-active --quiet muddown-discord-bridge; then
              echo "✓ muddown-discord-bridge is running"
            else
              echo "✗ muddown-discord-bridge failed to start"
              sudo journalctl -u muddown-discord-bridge -n 20 --no-pager
              exit 1
            fi

            echo "==> Setting file permissions..."
            sudo chmod -R o+rX "$INSTALL_DIR"

            echo "==> Deploy complete!"
          REMOTE_SCRIPT

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
